name: share-web CI

on:
  push:
    branches: [main]
    paths:
      - "eodigaljido-share-web/**"
      - ".github/workflows/share-web-ci.yml"
      - ".github/workflows/main.yml"
  pull_request:
    branches: [main]
    paths:
      - "eodigaljido-share-web/**"
      - ".github/workflows/share-web-ci.yml"
      - ".github/workflows/main.yml"
  workflow_dispatch:

env:
  # CI 빌드용 (운영 URL — 비밀 아님). 카카오 키는 Repository secrets에 추가 가능
  VITE_API_BASE_URL: ""
  VITE_SHARE_SITE_URL: https://eodigaljido.uk
  VITE_APP_SCHEME: eodigaljido
  VITE_PLAY_STORE_URL: https://play.google.com/store/apps/details?id=com.eodigaljido.app
  VITE_APP_STORE_URL: ""
  VITE_OG_IMAGE_URL: https://eodigaljido.uk/og-default.png
  VITE_KAKAO_MAP_APP_KEY: ${{ secrets.VITE_KAKAO_MAP_APP_KEY }}
  VITE_KAKAO_REST_API_KEY: ${{ secrets.VITE_KAKAO_REST_API_KEY }}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eodigaljido-share-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eodigaljido-share-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to EC2
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EC2_HOST:-}" ] || [ -z "${EC2_USER:-}" ] || [ -z "${EC2_KEY:-}" ]; then
            echo "EC2_HOST, EC2_USER, EC2_KEY secrets가 필요합니다."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/ec2_deploy_key \
            "${EC2_USER}@${EC2_HOST}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /var/www/web_front
          git fetch origin main
          git reset --hard origin/main
          cd eodigaljido-share-web
          npm ci
          npm run build
          sudo chcon -R -t httpd_sys_content_t dist 2>/dev/null || true
          sudo nginx -t
          sudo systemctl reload nginx
          echo "Deploy OK: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE
