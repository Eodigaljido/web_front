name: share-web CI

on:
  push:
    branches: [main]
    paths:
      - "eodigaljido-share-web/**"
      - ".github/workflows/share-web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "eodigaljido-share-web/**"
      - ".github/workflows/share-web-ci.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eodigaljido-share-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eodigaljido-share-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
